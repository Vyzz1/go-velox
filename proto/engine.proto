syntax = "proto3";

package velox.engine.v1;

option go_package = "github.com/Vyzz1/go-velox.git/proto/gen/engine/v1;enginev1";

message CheckLimitRequest {
  string tenant_id = 1;
  string subject = 2;
  string resource = 3;
  string action = 4;
  string rule_id = 5;
  uint32 cost = 6;
  map<string, string> attributes = 7;
}

message CheckLimitResponse {
  bool allowed = 1;
  uint64 limit = 2;
  uint64 remaining = 3;
  int64 reset_at_unix_ms = 4;
  int64 retry_after_ms = 5;
  string reason = 6;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
}

service LimiterEngineService {
  rpc CheckLimit(CheckLimitRequest) returns (CheckLimitResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}
