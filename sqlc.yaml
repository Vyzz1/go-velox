version: "2"
sql:
  - engine: "postgresql"
    schema: "infra/postgres/schema.sql"
    queries: "internal/configsvc/db/queries.sql"
    gen:
      go:
        package: "db"
        out: "internal/configsvc/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
