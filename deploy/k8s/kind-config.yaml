# 3-node kind cluster: 1 control-plane + 2 workers, so the 3 engine Pods can land
# on different nodes and node-level failover is demoable. Create with:
#   kind create cluster --name govelox --config deploy/k8s/kind-config.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: govelox
nodes:
  - role: control-plane
  - role: worker
  - role: worker
