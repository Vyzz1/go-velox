# ─────────────────────────────────────────────────────────────────────────────
# api-gateway — stateless, so a plain Deployment (the easy half).
# It polls velox-membership every 5s, builds the consistent-hash ring from the
# advertised engine_addr values, and routes each request to an engine Pod's
# gRPC via the headless Service DNS (velox-engine-N.velox-engine:9090).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velox-gateway
  namespace: velox
  labels: { app: velox-gateway }
spec:
  replicas: 2
  selector:
    matchLabels: { app: velox-gateway }
  template:
    metadata:
      labels: { app: velox-gateway }
    spec:
      containers:
        - name: gateway
          image: govelox/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http,    containerPort: 8080 }
            - { name: metrics, containerPort: 8090 }
          env:
            - { name: SERVICE_NAME, value: api-gateway }
            - { name: ENVIRONMENT,  value: production }
            - { name: LOG_LEVEL,    value: info }
            - { name: LOG_FORMAT,   value: json }
            - { name: HTTP_ADDR,    value: ":8080" }
            - { name: METRICS_ADDR, value: ":8090" }
            - { name: OTLP_ENDPOINT, value: "jaeger:4317" }
            # Load-balanced across all 3 sidecars — no single-sidecar dependency.
            - { name: SYNC_AGENT_URL, value: "http://velox-membership:7072" }
            # Startup fallback only; overwritten by the first successful poll.
            - { name: ENGINE_PORT, value: "9090" }
          readinessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: velox-gateway
  namespace: velox
  labels: { app: velox-gateway }
spec:
  # ClusterIP for in-cluster access; switch to LoadBalancer (or front with an
  # Ingress) to expose POST /v1/check to external clients.
  type: ClusterIP
  selector: { app: velox-gateway }
  ports:
    - { name: http, port: 8080, targetPort: http, protocol: TCP }
