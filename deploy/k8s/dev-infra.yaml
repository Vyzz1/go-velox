# ─────────────────────────────────────────────────────────────────────────────
# Throwaway in-cluster dependencies for TESTING Phase 1 only. NOT for production.
#
#   • redis-cluster  — a single standalone Redis. The engine's store uses
#                      go-redis NewUniversalClient, which with ONE address acts
#                      as a plain client, so a real Redis Cluster is unnecessary
#                      just to exercise the topology. (Service is named
#                      "redis-cluster" so engine.yaml needs no edit.)
#   • etcd           — a single-node etcd; the engine does a Get at boot, so it
#                      must be reachable, but one node is plenty.
#
# In production, replace both with the Redis Cluster / etcd charts (see README).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: velox
  labels: { app: redis }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7.0-alpine
          args: ["redis-server", "--appendonly", "no", "--save", ""]
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster        # name matches REDIS_ADDRS in engine.yaml
  namespace: velox
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  namespace: velox
  labels: { app: etcd }
spec:
  replicas: 1
  selector: { matchLabels: { app: etcd } }
  template:
    metadata:
      labels: { app: etcd }
    spec:
      containers:
        - name: etcd
          image: gcr.io/etcd-development/etcd:v3.5.18
          command:
            - /usr/local/bin/etcd
            - --name=etcd0
            - --data-dir=/tmp/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://0.0.0.0:2379
          ports: [{ containerPort: 2379 }]
          readinessProbe:
            exec: { command: ["etcdctl", "endpoint", "health"] }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: etcd                 # name matches ETCD_ENDPOINTS in engine.yaml
  namespace: velox
spec:
  selector: { app: etcd }
  ports: [{ port: 2379, targetPort: 2379 }]
---
# Postgres — source of truth for config-service rules. The schema is injected via
# a ConfigMap mounted into the init directory (same file the compose stack and
# sqlc use). Single-node, no persistence — throwaway test infra only.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-schema
  namespace: velox
data:
  schema.sql: |
    CREATE TABLE IF NOT EXISTS rules (
        tenant_id   TEXT        NOT NULL,
        rule_id     TEXT        NOT NULL,
        algorithm   TEXT        NOT NULL DEFAULT 'gcra',
        limit_count BIGINT      NOT NULL,
        period_secs BIGINT      NOT NULL,
        burst       BIGINT      NOT NULL DEFAULT 0,
        created_at  TIMESTAMPTZ NOT NULL DEFAULT now(),
        updated_at  TIMESTAMPTZ NOT NULL DEFAULT now(),
        PRIMARY KEY (tenant_id, rule_id)
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: velox
  labels: { app: postgres }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: velox }
            - { name: POSTGRES_PASSWORD, value: velox }
            - { name: POSTGRES_DB, value: velox }
          ports: [{ containerPort: 5432 }]
          volumeMounts:
            - { name: schema, mountPath: /docker-entrypoint-initdb.d }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "velox", "-d", "velox"] }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: schema
          configMap: { name: postgres-schema }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres             # matches DATABASE_URL host in config-service.yaml
  namespace: velox
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
