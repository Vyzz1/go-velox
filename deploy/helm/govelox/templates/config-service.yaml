{{- $cfg := include "govelox.config.fullname" . -}}
# ── config-service (Deployment) ──────────────────────────────────────────────
# Rule control plane: writes Postgres (source of truth) + mirrors to etcd for
# engine hot-reload. Off the request path; a single writer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $cfg }}
  labels:
    {{- include "govelox.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
spec:
  replicas: {{ .Values.config.replicas }}
  selector:
    matchLabels:
      app: {{ $cfg }}
  template:
    metadata:
      labels:
        app: {{ $cfg }}
        app.kubernetes.io/component: config
    spec:
      containers:
        - name: config-service
          image: "{{ .Values.config.image }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http,    containerPort: {{ .Values.config.httpPort }} }
            - { name: metrics, containerPort: {{ .Values.config.metricsPort }} }
          env:
            - { name: SERVICE_NAME, value: config-service }
            - { name: LOG_LEVEL,    value: info }
            - { name: LOG_FORMAT,   value: json }
            - { name: HTTP_ADDR,    value: ":{{ .Values.config.httpPort }}" }
            - { name: METRICS_ADDR, value: ":{{ .Values.config.metricsPort }}" }
            - { name: OTLP_ENDPOINT, value: {{ .Values.otlp.endpoint | quote }} }
            # Injected from a Secret (chart-created from postgres.url, or an
            # externally-managed config.existingSecret). See config-secret.yaml.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret | default (include "govelox.config.fullname" .) }}
                  key: {{ .Values.config.secretKey }}
            - { name: ETCD_ENDPOINTS, value: {{ .Values.etcd.endpoints | quote }} }
            - { name: ETCD_PREFIX,    value: {{ .Values.etcd.prefix | quote }} }
          readinessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.config.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $cfg }}
  labels:
    {{- include "govelox.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
spec:
  type: {{ .Values.config.serviceType }}
  selector:
    app: {{ $cfg }}
  ports:
    - { name: http, port: {{ .Values.config.httpPort }}, targetPort: http, protocol: TCP }
