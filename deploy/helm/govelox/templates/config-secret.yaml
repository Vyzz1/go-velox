{{- if not .Values.config.existingSecret }}
# Secret holding config-service's DATABASE_URL. Created from postgres.url only
# when no existingSecret is supplied. In production, prefer setting
# config.existingSecret to a Secret managed outside the chart (sealed-secrets,
# external-secrets, vault) so real credentials never live in values.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "govelox.config.fullname" . }}
  labels:
    {{- include "govelox.labels" . | nindent 4 }}
    app.kubernetes.io/component: config
type: Opaque
stringData:
  {{ .Values.config.secretKey }}: {{ .Values.postgres.url | quote }}
{{- end }}
