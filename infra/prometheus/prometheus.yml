global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Targets use docker-compose service DNS on velox-network, matching the
# `stack` profile (all services in Docker). The metrics port is the in-
# container port (not the remapped host port).
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "velox-limiter-engine"
    static_configs:
      - targets:
          - "limiter-engine-1:9091"
          - "limiter-engine-2:9091"
          - "limiter-engine-3:9091"

  - job_name: "velox-sync-agent"
    static_configs:
      - targets:
          - "sync-agent-1:7071"
          - "sync-agent-2:7071"
          - "sync-agent-3:7071"

  - job_name: "velox-api-gateway"
    static_configs:
      - targets: ["api-gateway:8090"]

  - job_name: "velox-config-service"
    static_configs:
      - targets: ["config-service:8082"]
