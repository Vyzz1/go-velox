global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "velox-api-gateway"
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: "velox-limiter-engine"
    static_configs:
      - targets: ["host.docker.internal:9091"]

  - job_name: "velox-config-service"
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: "velox-sync-agent"
    static_configs:
      - targets: ["host.docker.internal:7071"]