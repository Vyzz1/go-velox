version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - revive
    - gocritic
    - gosec
    - bodyclose
    - contextcheck
    - noctx
    - misspell
    - unconvert
    - unparam
    - nakedret
    - prealloc
    - stylecheck
    - whitespace

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs-use-default: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

  govet:
    enable-all: true
    disable:
      - fieldalignment

  misspell:
    locale: US

  nakedret:
    max-func-lines: 20

  revive:
    confidence: 0.8
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: empty-block
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
        arguments:
          - disableStutteringCheck
      - name: if-return
      - name: increment-decrement
      - name: indent-error-flow
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: redefines-builtin-id
      - name: superfluous-else
      - name: time-naming
      - name: unexported-return
      - name: unreachable-code
      - name: unused-parameter
      - name: var-declaration
      - name: var-naming

  staticcheck:
    checks:
      - all
      - -ST1000
      - -ST1003

  stylecheck:
    checks:
      - all
      - -ST1000
      - -ST1003
