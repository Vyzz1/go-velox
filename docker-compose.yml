version: "3.8"

name: velox-infra

x-redis-common: &redis-common
  image: redis:7.0-alpine
  networks:
    - velox-network
  profiles: [stack]
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 5s
    timeout: 3s
    retries: 20

# Shared definition for every limiter-engine replica. Each replica is an
# identical, stateless decision node (shared Redis + etcd); only the container
# name and published host ports differ per instance.
x-engine-common: &engine-common
  build:
    context: .
    dockerfile: cmd/limiter-engine/Dockerfile
  profiles: [stack]
  environment:
    SERVICE_NAME: limiter-engine
    ENVIRONMENT: development
    LOG_LEVEL: info
    LOG_FORMAT: json
    GRPC_ADDR: :9090
    METRICS_ADDR: :9091
    OTLP_ENDPOINT: jaeger:4317
    REDIS_ADDRS: redis-1:6379,redis-2:6379,redis-3:6379,redis-4:6379,redis-5:6379,redis-6:6379
    ETCD_ENDPOINTS: etcd:2379
    ETCD_PREFIX: /velox/rules/
    LIMITER_DEFAULT_LIMIT: "100"
    LIMITER_DEFAULT_PERIOD_SECS: "60"
    LIMITER_DEFAULT_BURST: "10"
  depends_on:
    redis-cluster-init:
      condition: service_completed_successfully
    jaeger:
      condition: service_started
    etcd:
      condition: service_started
  networks:
    - velox-network
  restart: on-failure

# Shared definition for every sync-agent sidecar. Each sidecar is co-located with
# one engine replica and advertises that engine's gRPC address over gossip
# (ROLE=engine, ENGINE_ADDR), so the gateway can discover the live engine fleet
# from any sidecar's /v1/members. Per-instance env (NODE_ID, ENGINE_ADDR, SEEDS)
# is set on each service below.
x-syncagent-common: &syncagent-common
  build:
    context: .
    dockerfile: cmd/sync-agent/Dockerfile
  profiles: [stack]
  networks:
    - velox-network
  restart: on-failure

services:
  # ─────────────────────────────────────────
  # Redis — standalone (dev profile)
  # Used when Go services run on the host.
  # ─────────────────────────────────────────
  redis:
    image: redis:7.0-alpine
    container_name: velox-redis
    profiles: [dev]
    ports:
      - "6379:6379"
    networks:
      - velox-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─────────────────────────────────────────
  # Redis Cluster — 3 masters + 3 replicas (stack profile)
  # Used when all services run inside Docker.
  # Internal DNS resolves redis-1..6 — no announce-ip tricks needed.
  # ─────────────────────────────────────────
  redis-1:
    <<: *redis-common
    container_name: velox-redis-1
    command: ["redis-server","--cluster-enabled","yes","--cluster-config-file","nodes.conf","--cluster-node-timeout","5000","--appendonly","yes"]

  redis-2:
    <<: *redis-common
    container_name: velox-redis-2
    command: ["redis-server","--cluster-enabled","yes","--cluster-config-file","nodes.conf","--cluster-node-timeout","5000","--appendonly","yes"]

  redis-3:
    <<: *redis-common
    container_name: velox-redis-3
    command: ["redis-server","--cluster-enabled","yes","--cluster-config-file","nodes.conf","--cluster-node-timeout","5000","--appendonly","yes"]

  redis-4:
    <<: *redis-common
    container_name: velox-redis-4
    command: ["redis-server","--cluster-enabled","yes","--cluster-config-file","nodes.conf","--cluster-node-timeout","5000","--appendonly","yes"]

  redis-5:
    <<: *redis-common
    container_name: velox-redis-5
    command: ["redis-server","--cluster-enabled","yes","--cluster-config-file","nodes.conf","--cluster-node-timeout","5000","--appendonly","yes"]

  redis-6:
    <<: *redis-common
    container_name: velox-redis-6
    command: ["redis-server","--cluster-enabled","yes","--cluster-config-file","nodes.conf","--cluster-node-timeout","5000","--appendonly","yes"]

  redis-cluster-init:
    image: redis:7.0-alpine
    container_name: velox-redis-init
    profiles: [stack]
    depends_on:
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-4:
        condition: service_healthy
      redis-5:
        condition: service_healthy
      redis-6:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        if redis-cli -h redis-1 -p 6379 cluster info | grep -q "cluster_state:ok"; then
          echo "Redis cluster already initialized — skipping.";
        else
          echo 'yes' | redis-cli --cluster create \
            redis-1:6379 redis-2:6379 redis-3:6379 \
            redis-4:6379 redis-5:6379 redis-6:6379 \
            --cluster-replicas 1;
        fi
    networks:
      - velox-network
    restart: "no"

  # ─────────────────────────────────────────
  # limiter-engine — 3 replicas (stack profile)
  # Stateless decision nodes behind the gateway's consistent-hash ring. Each is
  # reachable on the internal network as limiter-engine-{1,2,3}:9090; host ports
  # are mapped on distinct numbers for per-replica grpcurl/testing.
  # ─────────────────────────────────────────
  limiter-engine-1:
    <<: *engine-common
    container_name: velox-limiter-engine-1
    ports:
      - "9090:9090"   # gRPC
      - "9091:9091"   # metrics

  limiter-engine-2:
    <<: *engine-common
    container_name: velox-limiter-engine-2
    ports:
      - "9095:9090"   # gRPC
      - "9096:9091"   # metrics

  limiter-engine-3:
    <<: *engine-common
    container_name: velox-limiter-engine-3
    ports:
      - "9097:9090"   # gRPC
      - "9098:9091"   # metrics

  # ─────────────────────────────────────────
  # api-gateway (stack profile)
  # ─────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: cmd/api-gateway/Dockerfile
    container_name: velox-api-gateway
    profiles: [stack]
    environment:
      SERVICE_NAME: api-gateway
      ENVIRONMENT: development
      LOG_LEVEL: info
      LOG_FORMAT: json
      HTTP_ADDR: :8080
      METRICS_ADDR: :8090
      OTLP_ENDPOINT: jaeger:4317
      # Discovery: poll a sidecar's membership API and build the engine ring from
      # the advertised engine_addr values. ENGINE_PORT is only a startup fallback.
      SYNC_AGENT_URL: http://sync-agent-1:7072
      ENGINE_PORT: "9090"
    ports:
      - "8080:8080"   # REST — external client entry point
      - "8090:8090"   # metrics
    depends_on:
      sync-agent-1:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - velox-network
    restart: on-failure

  # ─────────────────────────────────────────
  # Postgres — source of truth for rules (stack profile)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: velox-postgres
    profiles: [stack]
    environment:
      POSTGRES_USER: velox
      POSTGRES_PASSWORD: velox
      POSTGRES_DB: velox
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velox -d velox"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - velox-network

  # ─────────────────────────────────────────
  # config-service (stack profile)
  # REST rule management; writes Postgres + mirrors to etcd for hot-reload.
  # ─────────────────────────────────────────
  config-service:
    build:
      context: .
      dockerfile: cmd/config-service/Dockerfile
    container_name: velox-config-service
    profiles: [stack]
    environment:
      SERVICE_NAME: config-service
      ENVIRONMENT: development
      LOG_LEVEL: info
      LOG_FORMAT: json
      HTTP_ADDR: :8081
      METRICS_ADDR: :8082
      OTLP_ENDPOINT: jaeger:4317
      DATABASE_URL: postgres://velox:velox@postgres:5432/velox?sslmode=disable
      ETCD_ENDPOINTS: etcd:2379
      ETCD_PREFIX: /velox/rules/
    ports:
      - "8081:8081"   # REST — rule management API
      - "8082:8082"   # metrics
    depends_on:
      postgres:
        condition: service_healthy
      etcd:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - velox-network
    restart: on-failure

  # ─────────────────────────────────────────
  # sync-agent — gossip sidecars (stack profile)
  # One sidecar per limiter-engine replica. Each forms a SWIM cluster (node-2/3
  # seed via node-1) and advertises its engine's gRPC address over gossip
  # (ROLE=engine, ENGINE_ADDR). The gateway reads /v1/members from sync-agent-1
  # to discover the live engine fleet.
  # Demo: curl any sidecar's /v1/members → all 3 engines listed with engine_addr.
  # ─────────────────────────────────────────
  sync-agent-1:
    <<: *syncagent-common
    container_name: velox-sync-agent-1
    environment:
      SERVICE_NAME: sync-agent
      ENVIRONMENT: development
      LOG_LEVEL: info
      LOG_FORMAT: json
      NODE_ID: sync-agent-1
      GOSSIP_PORT: "7070"
      HTTP_ADDR: :7072
      METRICS_ADDR: :7071
      ROLE: engine
      ENGINE_ADDR: limiter-engine-1:9090
      # First node: no seeds — it forms the cluster the others join.
      SEEDS: ""
    ports:
      - "7072:7072"   # membership API
    depends_on:
      limiter-engine-1:
        condition: service_started

  sync-agent-2:
    <<: *syncagent-common
    container_name: velox-sync-agent-2
    environment:
      SERVICE_NAME: sync-agent
      ENVIRONMENT: development
      LOG_LEVEL: info
      LOG_FORMAT: json
      NODE_ID: sync-agent-2
      GOSSIP_PORT: "7070"
      HTTP_ADDR: :7072
      METRICS_ADDR: :7071
      ROLE: engine
      ENGINE_ADDR: limiter-engine-2:9090
      SEEDS: "sync-agent-1:7070"
    ports:
      - "7073:7072"
    depends_on:
      limiter-engine-2:
        condition: service_started
      sync-agent-1:
        condition: service_started

  sync-agent-3:
    <<: *syncagent-common
    container_name: velox-sync-agent-3
    environment:
      SERVICE_NAME: sync-agent
      ENVIRONMENT: development
      LOG_LEVEL: info
      LOG_FORMAT: json
      NODE_ID: sync-agent-3
      GOSSIP_PORT: "7070"
      HTTP_ADDR: :7072
      METRICS_ADDR: :7071
      ROLE: engine
      ENGINE_ADDR: limiter-engine-3:9090
      SEEDS: "sync-agent-1:7070"
    ports:
      - "7074:7072"
    depends_on:
      limiter-engine-3:
        condition: service_started
      sync-agent-1:
        condition: service_started

  # ─────────────────────────────────────────
  # Etcd (always)
  # ─────────────────────────────────────────
  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.18
    container_name: velox-etcd
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      ETCD_NAME: etcd0
      ETCD_DATA_DIR: /etcd-data

      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://127.0.0.1:2379

      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://127.0.0.1:2380

      ETCD_INITIAL_CLUSTER: etcd0=http://127.0.0.1:2380
      ETCD_INITIAL_CLUSTER_TOKEN: etcd-cluster-token
      ETCD_INITIAL_CLUSTER_STATE: new
    volumes:
      - etcd-data:/etcd-data
    networks:
      - velox-network

  # ─────────────────────────────────────────
  # Jaeger (always)
  # ─────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: velox-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - velox-network

  # ─────────────────────────────────────────
  # Prometheus (always)
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: velox-prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    networks:
      - velox-network

  # ─────────────────────────────────────────
  # Grafana (always)
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: velox-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - velox-network

networks:
  velox-network:
    driver: bridge

volumes:
  etcd-data:
  postgres-data:
  prometheus-data:
  grafana-data:
